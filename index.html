<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="utf-8" />
        <title>What's Cooking Today?</title>
        <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header>
        <h1>🍳 What's Cooking Today?</h1>
        <form id="searchForm">
            <div class="search-row">
                <input id="searchInput" type="text" placeholder="Search meals..." />
                <button id="searchButton" type="submit">Search</button>
            </div>
        </form>

        <div class="header-actions">
            <select id="categoryfilter">
                <option value="">All Categories</option>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="dessert">Dessert</option>
            </select>

            <div class="controls">
                <button id="randomrecipe">🎲 Surprise Me!</button>
                <button id="darkModeToggle">🌙 Dark Mode</button>
            </div>
        </div>
    </header>

    <!--Recipes grid-->
    <section id="recipes"></section>

    <!--Add recipe form-->
    <section id="addRecipe">
        <h2>Add Your Own Recipe</h2>
            <input type="text" id="newName" placeholder="Recipe Name" required />
            <input type="text" id="newImg" placeholder="Image URL" required />
            <textarea id="newDesc" placeholder="Short Description" required></textarea>

            <select id="newCategory" required>
                <option value="">Select Category</option>
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="dessert">Dessert</option>
            </select>
            
             <!-- Bug fix: these two fields were missing from the HTML -->
            <textarea id="newIngredients" placeholder="Ingredients (one per line)" required></textarea>
            <textarea id="newDirections" placeholder="Directions (one step per line)" required></textarea>

            <button id="addRecipeButton">Add Recipe</button>
    </section>
        
    <script src="app.js"></script>

</body>

</html>
