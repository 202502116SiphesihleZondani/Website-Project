<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Details</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #ff914f;
            color: white;
        }
        #recipeDetail {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .recipe-detail-card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        body.dark-mode .recipe-detail-card {
            background-color: #333;
            color: white;
        }
        .recipe-detail-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }
        .recipe-detail-card .content {
            padding: 20px;
        }
        .recipe-detail-card h2,
        .recipe-detail-card h3,
        .recipe-detail-card p,
        .recipe-detail-card li {
            margin: 10px 0;
        }
        .recipe-detail-card ul {
            padding-left: 20px;
        }
        button,
        .back-link {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
        }
        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Recipe Details</h1>
        <div class="header-controls">
            <button id="backButton">Back</button>
            <a class="back-link" href="index.html">Back to Recipe List</a>
            <button id="darkModeToggle">🌙 Dark Mode</button>
        </div>
    </header>
    <main id="recipeDetail"></main>

    <script>
           // Bug fix: recipe-detail.html no longer duplicates the full recipeData array.
        // It reads the selected recipe from sessionStorage (set by app.js on card click),
        // or falls back to the MealDB random meal data.

        function getQueryParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function buildIngredients(meal) {
            const items = [];
            for (let i = 1; i <= 20; i++) {
                const ingredient = meal[`strIngredient${i}`];
                const measure = meal[`strMeasure${i}`];
                if (ingredient && ingredient.trim()) {
                    items.push(`${measure ? measure.trim() + ' ' : ''}${ingredient.trim()}`.trim());
                }
            }
            return items;
        }

        function renderRecipe(recipe) {
            const ingredientsList = Array.isArray(recipe.ingredients)
                ? recipe.ingredients.map(item => `<li>${item}</li>`).join('')
                : String(recipe.ingredients).split('\n').map(i => `<li>${i}</li>`).join('');

            const directionsList = Array.isArray(recipe.directions)
                ? recipe.directions.map(step => `<li>${step}</li>`).join('')
                : String(recipe.directions).split('\n').map(s => `<li>${s}</li>`).join('');

            recipeDetail.innerHTML = `
                <div class="recipe-detail-card">
                    <img src="${recipe.image}" alt="${recipe.name} image">
                    <div class="content">
                        <h2>${recipe.name}</h2>
                        <p>${recipe.description}</p>
                        <p><strong>Category:</strong> ${recipe.category.toUpperCase()}</p>
                        <h3>Ingredients</h3>
                        <ul>${ingredientsList}</ul>
                        <h3>Directions</h3>
                        <ol>${directionsList}</ol>
                    </div>
                </div>
            `;
        }

        const recipeDetail = document.getElementById('recipeDetail');
        const random = getQueryParam('random') === 'true';
        let recipe = null;

        if (random) {
            const storedMeal = sessionStorage.getItem('randomMeal');
            if (storedMeal) {
                const meal = JSON.parse(storedMeal);
                recipe = {
                    name: meal.strMeal,
                    image: meal.strMealThumb,
                    description: meal.strInstructions.split('. ')[0] || meal.strInstructions,
                    category: meal.strCategory || 'Unknown',
                    ingredients: buildIngredients(meal),
                    directions: meal.strInstructions.split(/\.\s+|\n/).filter(Boolean)
                };
            }
        } else {
            // Read from sessionStorage — set by app.js when a card is clicked
            const stored = sessionStorage.getItem('selectedRecipe');
            if (stored) {
                recipe = JSON.parse(stored);
            }
        }

        if (!recipe) {
            recipeDetail.innerHTML = '<div class="recipe-detail-card"><div class="content"><p>Recipe not found. Please <a href="index.html">return to the recipe list</a> and try again.</p></div></div>';
        } else {
            renderRecipe(recipe);
        }

        document.getElementById('backButton').addEventListener('click', () => {
            window.history.back();
        });

        document.getElementById('darkModeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });
         </script>
</body>
</html>
